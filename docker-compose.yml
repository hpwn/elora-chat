name: ${COMPOSE_PROJECT_NAME:-elora}

services:
  elora-chat:
    image: ${ELORA_IMAGE}
    build:
      context: .
      dockerfile: Dockerfile
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    env_file:
      - .env
    environment:
      TZ: ${TZ}
      LOG_LEVEL: ${LOG_LEVEL}
    volumes:
      - ./data:${ELORA_DATA_DIR}
    ports:
      - "${ELORA_HTTP_PORT:-8080}:${ELORA_HTTP_PORT:-8080}"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:${ELORA_HTTP_PORT:-8080}/readyz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - elora
    restart: unless-stopped
  # NOTE: gnasty-harvester pulls the prebuilt gnasty-chat image; update harvester code in
  # the gnasty-chat project and rebuild/retag gnasty-chat:latest (or set GNASTY_IMAGE)
  # for changes to take effect.
  gnasty-harvester:
    image: ${GNASTY_IMAGE}
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    env_file:
      - .env
    environment:
      TZ: ${TZ}
      GNASTY_YT_DUMP_UNHANDLED: ${GNASTY_YT_DUMP_UNHANDLED:-0}
    volumes:
      - ./data:${ELORA_DATA_DIR}
    depends_on:
      elora-chat:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:${GNASTY_HTTP_PORT:-8765}/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - elora
    restart: unless-stopped

networks:
  elora:
    name: ${ELORA_DOCKER_NETWORK:-elora-network}
    driver: bridge
