name: CI
on:
  push:
    branches: [ main, feat/sqlite-db ]
  pull_request:
    branches: [ main, feat/sqlite-db ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure legacy Python harvester files are absent
        run: |
          set -euo pipefail
          matches=$(git ls-files -z -- 'python/**' 'python/requirements.txt' 'fetch_chat.py' 'scripts/fetch_chat.py' 'chat_downloader' 'chat_downloader/**' 'scripts/chat_downloader' 'scripts/chat_downloader/**' 2>/dev/null | tr '\0' '\n' | sed '/^$/d')
          if [ -n "$matches" ]; then
            echo "Legacy Python harvester files detected:" >&2
            echo "$matches" >&2
            echo 'Remove them before running CI.' >&2
            exit 1
          fi

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }

      - name: Backend tests
        run: |
          if [ -f src/backend/go.mod ]; then
            (cd src/backend && go test ./...)
          elif [ -f go.mod ]; then
            go test ./...
          else
            echo "No Go module found; skipping backend tests."
          fi

      - name: Frontend tests
        run: |
          if [ -f src/frontend/package.json ]; then
            cd src/frontend
            npm ci
            npm test
            npm run build
          else
            echo "No frontend found at src/frontend; skipping."
          fi

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [ build-and-test ]
    runs-on: ubuntu-latest
    steps:
      - run: echo "Deploy steps go here (skipped on feat/sqlite-db)."
