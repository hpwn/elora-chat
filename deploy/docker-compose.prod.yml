services:
  elora-chat:
    container_name: ${COMPOSE_PROJECT_NAME:-elora}-elora-chat
    ports: !reset []
    expose:
      - "8080"
    networks:
      - elora
      - edge

  gnasty-harvester:
    container_name: ${COMPOSE_PROJECT_NAME:-elora}-gnasty-harvester
    ports: !reset []
    networks:
      - elora
      - edge

networks:
  edge:
    name: elora-edge
    external: true
