services:
  caddy:
    container_name: elora-edge-caddy
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - edge
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:

networks:
  edge:
    name: elora-edge
    external: true
